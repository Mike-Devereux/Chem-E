<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Supervisor Course Summaries</title>
</head>
<body>
    <h1>Course result summaries</h1>
    {% if courses %}
        <ul>
            {% for course in courses %}
                <li>
                    <a href="{% url 'supervisor_course_summary' course.id %}">{{ course.title }}</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No accessible courses.</p>
    {% endif %}
    <p><a href="{% url 'supervisor_landing' %}">Back to supervisor landing</a></p>
</body>
</html>
