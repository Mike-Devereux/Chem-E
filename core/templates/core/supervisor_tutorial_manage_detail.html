<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tutorial Editor - {{ tutorial.title }}</title>
</head>
<body>
    <h1>{{ tutorial.title }}</h1>
    <p>Course: <a href="{% url 'supervisor_course_manage_detail' tutorial.course.id %}">{{ tutorial.course.title }}</a></p>
    <p>
        <a href="{% url 'supervisor_tutorial_edit' tutorial.id %}">Edit tutorial</a> |
        <a href="{% url 'supervisor_exercise_create' tutorial.id %}">Create exercise</a>
    </p>
    <h2>Exercises</h2>
    {% if exercises %}
        <ul>
            {% for exercise in exercises %}
                <li>
                    <a href="{% url 'supervisor_exercise_manage_detail' exercise.id %}">{{ exercise.title }}</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No exercises yet.</p>
    {% endif %}
</body>
</html>
