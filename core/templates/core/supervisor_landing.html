<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Supervisor Landing</title>
</head>
<body>
    <h1>Supervisor Dashboard</h1>
    <ul>
        <li><a href="{% url 'home' %}">Browse current courses (student view)</a></li>
        <li><a href="{% url 'supervisor_course_summary_list' %}">Browse student results / assign grades</a></li>
        <li><a href="{% url 'supervisor_tree' %}">Admin: edit or create courses and exercises</a></li>
        {% if request.user.is_superuser or request.user.role == "administrator" %}
        <li><a href="/admin/">Admin area</a></li>
        {% endif %}
    </ul>
</body>
</html>
