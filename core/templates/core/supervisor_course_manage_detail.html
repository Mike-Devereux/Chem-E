<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Course Editor - {{ course.title }}</title>
</head>
<body>
    <h1>{{ course.title }}</h1>
    <p>
        <a href="{% url 'supervisor_course_edit' course.id %}">Edit course</a> |
        <a href="{% url 'supervisor_tutorial_create' course.id %}">Create tutorial</a>
    </p>
    <h2>Tutorials</h2>
    {% if tutorials %}
        <ul>
            {% for tutorial in tutorials %}
                <li>
                    <a href="{% url 'supervisor_tutorial_manage_detail' tutorial.id %}">{{ tutorial.title }}</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No tutorials yet.</p>
    {% endif %}
    <p><a href="{% url 'supervisor_course_manage_list' %}">Back to courses</a></p>
</body>
</html>
