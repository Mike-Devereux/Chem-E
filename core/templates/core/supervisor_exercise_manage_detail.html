<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exercise Editor - {{ exercise.title }}</title>
</head>
<body>
    <h1>{{ exercise.title }}</h1>
    <p>
        Tutorial:
        <a href="{% url 'supervisor_tutorial_manage_detail' exercise.tutorial.id %}">{{ exercise.tutorial.title }}</a>
    </p>
    <p>
        <a href="{% url 'supervisor_exercise_edit' exercise.id %}">Edit exercise</a> |
        <a href="{% url 'supervisor_exercise_variant_create' exercise.id %}">Create variant</a>
    </p>
    <h2>Variants</h2>
    {% if variants %}
        <ul>
            {% for variant in variants %}
                <li>
                    Variant {{ forloop.counter }} -
                    <a href="{% url 'supervisor_exercise_variant_manage_detail' variant.id %}">Manage parts</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No variants yet.</p>
    {% endif %}
</body>
</html>
