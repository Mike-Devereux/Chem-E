<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
            max-width: 32rem;
        }
        form {
            display: grid;
            gap: 0.75rem 1rem;
            max-width: 32rem;
        }
        form p {
            margin: 0;
            display: grid;
            grid-template-columns: 120px 1fr;
            align-items: center;
            gap: 1rem;
        }
        form p > label {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            text-align: right;
        }
        input, button {
            font: inherit;
            padding: 0.5rem;
            box-sizing: border-box;
        }
        .errorlist {
            color: #b00020;
            margin: 0.25rem 0;
            padding-left: 1rem;
        }
        .login-submit {
            width: 100%;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <h1>Login</h1>
    <nav>
        <a href="/">Home</a> |
        <a href="/register/">Register</a>
    </nav>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="login-submit" type="submit">Login</button>
    </form>
    <p><a href="/password-reset/">Forgot password?</a></p>
</body>
</html>
