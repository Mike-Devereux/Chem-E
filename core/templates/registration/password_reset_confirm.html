<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Set new password</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; max-width: 32rem; }
        form { display: grid; gap: 0.75rem; }
        input, button { font: inherit; padding: 0.5rem; }
    </style>
</head>
<body>
    <h1>Set a new password</h1>
    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save new password</button>
        </form>
    {% else %}
        <p>This password reset link is invalid or expired.</p>
        <p><a href="/password-reset/">Request a new link</a></p>
    {% endif %}
</body>
</html>
